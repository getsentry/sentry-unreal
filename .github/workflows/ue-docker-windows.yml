      - name: Log in to Personal GitHub package registry
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          registry: ${{ env.REGISTRY }}
          username: tustanivsky
          password: ${{ secrets.PERSONAL_GHCR_TOKEN }}

      - name: Pull pre-built Docker image
        env:
          UE_VERSION: ${{ inputs.ue_version }}
        run: |
          docker pull "ghcr.io/tustanivsky/ue4-minimal:custom-$env:UE_VERSION"

      - name: Log in to Sentry GitHub package registry
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push Docker image with pre-built Unreal Engine
        env:
          UE_VERSION: ${{ inputs.ue_version }}
        run: |
          docker tag "ghcr.io/tustanivsky/ue4-minimal:custom-$env:UE_VERSION" "$env:REGISTRY/getsentry/unreal-docker:$env:UE_VERSION"
          docker push "$env:REGISTRY/getsentry/unreal-docker:$env:UE_VERSION"
