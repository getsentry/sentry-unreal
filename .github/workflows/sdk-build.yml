on:
  workflow_call:
    inputs:
      runsOn:
        required: true
        type: string
      target:
        required: true
        type: string
      container:
        required: false
        type: string
      backend:
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ${{ inputs.runsOn }}
    container:
      image: ${{ inputs.container }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - name: Configure env for Linux docker containers
        if: ${{ inputs.target == 'Linux' || inputs.target == 'LinuxArm64' }}
        run: |
          sed -i 's|http://archive.ubuntu.com|http://azure.archive.ubuntu.com|g; s|http://security.ubuntu.com|http://azure.archive.ubuntu.com|g' /etc/apt/sources.list
          apt-get update
          apt-get -y install sudo
          apt-get -y install wget
          apt-get -y install cmake
          apt-get -y install software-properties-common
          apt-get -y install git
          git config --global --add safe.directory $(pwd)

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select submodule
        id: env
        env:
          TARGET: ${{ inputs.target }}
          BACKEND: ${{ inputs.backend }}
        run: |
          if [[ "$TARGET" == "Android" ]]; then
            submodule="modules/sentry-java"
          else
            submodule="modules/sentry-native"
          fi
          echo "submodule=$submodule" >> $GITHUB_OUTPUT

          if [[ -n "$BACKEND" ]]; then
            buildScript="scripts/build-$(echo "$TARGET" | tr '[:upper:]' '[:lower:]')-${BACKEND}.sh"
            artifactName="${TARGET}-${BACKEND}-sdk"
            path="plugin-dev/Source/ThirdParty/$TARGET/$(echo "$BACKEND" | sed 's/.*/\u&/')"
          else
            buildScript="scripts/build-$(echo "$TARGET" | tr '[:upper:]' '[:lower:]').sh"
            artifactName="${TARGET}-sdk"
            path="plugin-dev/Source/ThirdParty/$TARGET"
          fi
          echo "path=$path" >> $GITHUB_OUTPUT
          echo "buildScript=$buildScript" >> $GITHUB_OUTPUT
          echo "artifactName=$artifactName" >> $GITHUB_OUTPUT

      - name: Get submodule status
        env:
          SUBMODULE: ${{ steps.env.outputs.submodule }}
        run: |
          git submodule status --cached "$SUBMODULE" | tee submodule-status

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        id: cache
        with:
          path: |
            ${{ steps.env.outputs.path }}
          key: sdk=${{ steps.env.outputs.artifactName }}-${{ hashFiles('submodule-status', 'scripts/build-*.sh', '.github/workflows/sdk-build.yml') }}

      - name: Install Linux/LinuxArm64 Dependencies
        if: ${{ (inputs.target == 'Linux' || inputs.target == 'LinuxArm64') && steps.cache.outputs.cache-hit != 'true' }}
        run: |
          sudo apt-get update
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 13
          sudo ./llvm.sh 16
          sudo apt-get -y install libc++-16-dev libc++abi-16-dev libstdc++-11-dev zlib1g-dev libcurl4-openssl-dev

      - name: Install Windows Dependencies
        if: ${{ inputs.target == 'Win64' && steps.cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri 'https://aka.ms/vs/16/release/vs_buildtools.exe' -OutFile 'vs_buildtools.exe'
          Start-Process -Wait -FilePath './vs_buildtools.exe' -ArgumentList '--quiet', '--wait', '--add', 'Microsoft.VisualStudio.Workload.VCTools', '--add', 'Microsoft.VisualStudio.Component.VC.Tools.x86.x64', '--add', 'Microsoft.VisualStudio.Component.Windows10SDK.19041'

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        if: ${{ inputs.target == 'Android' }}
        with:
          distribution: temurin
          java-version: 17

      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          SUBMODULE: ${{ steps.env.outputs.submodule }}
          BUILD_PATH: ${{ steps.env.outputs.path }}
          BUILD_SCRIPT: ${{ steps.env.outputs.buildScript }}
        run: |
          git submodule update --init --recursive "$SUBMODULE"
          mkdir -p "$BUILD_PATH"
          "$BUILD_SCRIPT" "$SUBMODULE" "$BUILD_PATH"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ steps.env.outputs.artifactName }}
          path: ${{ steps.env.outputs.path }}
          retention-days: ${{ github.ref_name == 'main' && 14 || 1 }}
