name: package-plugin-workflow

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    paths-ignore:
      - "**.md"

jobs:
  android-sdk:
    uses: ./.github/workflows/sdk-build.yml
    with:
      target: Android
      runsOn: ubuntu-latest

  ios-sdk:
    uses: ./.github/workflows/sdk-download.yml
    with:
      target: IOS
      runsOn: ubuntu-latest

  macos-sdk:
    uses: ./.github/workflows/sdk-download.yml
    with:
      target: Mac
      runsOn: ubuntu-latest

  linux-sdk-crashpad:
    uses: ./.github/workflows/sdk-build.yml
    with:
      target: Linux
      backend: crashpad
      runsOn: ubuntu-22.04
      container: ubuntu:20.04

  linux-sdk-native:
    uses: ./.github/workflows/sdk-build.yml
    with:
      target: Linux
      backend: native
      runsOn: ubuntu-22.04
      container: ubuntu:20.04

  linux-arm64-sdk-crashpad:
    uses: ./.github/workflows/sdk-build.yml
    with:
      target: LinuxArm64
      backend: crashpad
      runsOn: ubuntu-22.04-arm
      container: arm64v8/ubuntu:20.04

  linux-arm64-sdk-native:
    uses: ./.github/workflows/sdk-build.yml
    with:
      target: LinuxArm64
      backend: native
      runsOn: ubuntu-22.04-arm
      container: arm64v8/ubuntu:20.04

  windows-sdk-crashpad:
    uses: ./.github/workflows/sdk-build.yml
    with:
      target: Win64
      backend: crashpad
      runsOn: windows-2022

  windows-sdk-native:
    uses: ./.github/workflows/sdk-build.yml
    with:
      target: Win64
      backend: native
      runsOn: windows-2022

  windows-arm64-sdk-crashpad:
    uses: ./.github/workflows/sdk-build.yml
    with:
      target: WinArm64
      backend: crashpad
      runsOn: windows-11-arm

  windows-arm64-sdk-native:
    uses: ./.github/workflows/sdk-build.yml
    with:
      target: WinArm64
      backend: native
      runsOn: windows-11-arm

  crash-reporter-win64:
    uses: ./.github/workflows/crash-reporter-build.yml
    with:
      target: Win64
      runsOn: windows-latest
      runtimeId: win-x64

  crash-reporter-win-arm64:
    uses: ./.github/workflows/crash-reporter-build.yml
    with:
      target: WinArm64
      runsOn: windows-11-arm
      runtimeId: win-arm64

  crash-reporter-linux:
    uses: ./.github/workflows/crash-reporter-build.yml
    with:
      target: Linux
      runsOn: ubuntu-latest
      runtimeId: linux-x64

  crash-reporter-linux-arm64:
    uses: ./.github/workflows/crash-reporter-build.yml
    with:
      target: LinuxArm64
      runsOn: ubuntu-latest
      runtimeId: linux-arm64

  macos-sdk-native:
    uses: ./.github/workflows/sdk-build.yml
    with:
      target: Mac
      backend: native
      runsOn: macos-latest

  crash-reporter-mac:
    uses: ./.github/workflows/crash-reporter-build.yml
    with:
      target: Mac
      runsOn: macos-latest
      runtimeId: osx-arm64

  package-preparation:
    needs: [android-sdk, ios-sdk, macos-sdk, macos-sdk-native, linux-sdk-crashpad, linux-sdk-native, linux-arm64-sdk-crashpad, linux-arm64-sdk-native, windows-sdk-crashpad, windows-sdk-native, windows-arm64-sdk-crashpad, windows-arm64-sdk-native, crash-reporter-win64, crash-reporter-win-arm64, crash-reporter-linux, crash-reporter-linux-arm64, crash-reporter-mac]
    name: Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Download CLI
        shell: pwsh
        run: ./scripts/download-cli.ps1

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: Android-sdk
          path: plugin-dev/Source/ThirdParty/Android

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: IOS-sdk
          path: plugin-dev/Source/ThirdParty/IOS

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: Mac-sdk
          path: plugin-dev/Source/ThirdParty/Mac

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: Mac-native-sdk
          path: plugin-dev/Source/ThirdParty/Mac/Native

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: Linux-crashpad-sdk
          path: plugin-dev/Source/ThirdParty/Linux/Crashpad

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: Linux-native-sdk
          path: plugin-dev/Source/ThirdParty/Linux/Native

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: LinuxArm64-crashpad-sdk
          path: plugin-dev/Source/ThirdParty/LinuxArm64/Crashpad

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: LinuxArm64-native-sdk
          path: plugin-dev/Source/ThirdParty/LinuxArm64/Native

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: Win64-crashpad-sdk
          path: plugin-dev/Source/ThirdParty/Win64/Crashpad

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: Win64-native-sdk
          path: plugin-dev/Source/ThirdParty/Win64/Native

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: WinArm64-crashpad-sdk
          path: plugin-dev/Source/ThirdParty/WinArm64/Crashpad

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: WinArm64-native-sdk
          path: plugin-dev/Source/ThirdParty/WinArm64/Native

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: CrashReporter-Win64
          path: plugin-dev/Source/ThirdParty/Win64

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: CrashReporter-WinArm64
          path: plugin-dev/Source/ThirdParty/WinArm64

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: CrashReporter-Linux
          path: plugin-dev/Source/ThirdParty/Linux

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: CrashReporter-LinuxArm64
          path: plugin-dev/Source/ThirdParty/LinuxArm64

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: CrashReporter-Mac
          path: plugin-dev/Source/ThirdParty/Mac

      # Workaround for https://github.com/actions/download-artifact/issues/14
      # Adding execute permission for crashpad before preparing final packages
      # allows to avoid issues with plugin initialization on Unix-based systems.
      - name: Set permissions for executables
        shell: pwsh
        run: |
          chmod +x plugin-dev/Source/ThirdParty/Linux/Crashpad/bin/crashpad_handler
          chmod +x plugin-dev/Source/ThirdParty/Linux/Native/bin/sentry-crash
          chmod +x plugin-dev/Source/ThirdParty/Linux/Sentry.CrashReporter
          chmod +x plugin-dev/Source/ThirdParty/LinuxArm64/Crashpad/bin/crashpad_handler
          chmod +x plugin-dev/Source/ThirdParty/LinuxArm64/Native/bin/sentry-crash
          chmod +x plugin-dev/Source/ThirdParty/LinuxArm64/Sentry.CrashReporter
          chmod +x plugin-dev/Source/ThirdParty/Mac/Native/bin/sentry-crash
          chmod +x plugin-dev/Source/ThirdParty/Mac/Sentry.CrashReporter

      - name: Prepare Sentry packages for release
        shell: pwsh
        run: ./scripts/packaging/pack.ps1

      - name: Upload release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          # Artifact name is the commit sha. Which is what craft uses to find the relevant artifact.
          name: ${{ github.sha }}
          if-no-files-found: error
          path: |
            sentry-unreal-*.zip

  package-validation:
    needs: [package-preparation]
    name: Check snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download packages
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: ${{ github.sha }}

      # If this step fails, you can accept the new file content by
      # running the following script locally with 'accept' as an argument
      # and committing the new snapshot file to your branch. i.e:
      # pwsh ./scripts/test-contents.ps1 accept
      - name: Verify package content against snapshot
        shell: pwsh
        run: ./scripts/packaging/test-contents.ps1

  test-linux:
    needs: [package-preparation]
    name: Linux UE ${{ matrix.unreal }}
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unreal: ['4.27', '5.2', '5.3', '5.4', '5.5', '5.6', '5.7']
    uses: ./.github/workflows/test-linux.yml
    with:
      unreal-version: ${{ matrix.unreal }}

  test-windows:
    needs: [package-preparation]
    name: Windows UE ${{ matrix.unreal }}
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unreal: ['4.27', '5.2', '5.3', '5.4', '5.5', '5.6', '5.7']
    uses: ./.github/workflows/test-windows.yml
    with:
      unreal-version: ${{ matrix.unreal }}

  test-android:
    needs: [package-preparation]
    name: Android UE ${{ matrix.unreal }}
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unreal: ['4.27', '5.2', '5.3', '5.4', '5.5', '5.6', '5.7']
    uses: ./.github/workflows/test-android.yml
    with:
      unreal-version: ${{ matrix.unreal }}

  integration-test-linux:
    needs: [test-linux]
    name: Linux UE ${{ matrix.unreal }} (${{ matrix.backend }})
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unreal: ['4.27', '5.2', '5.3', '5.4', '5.5', '5.6', '5.7']
        backend: [crashpad, native]
    uses: ./.github/workflows/integration-test-linux.yml
    with:
      unreal-version: ${{ matrix.unreal }}
      backend: ${{ matrix.backend }}

  integration-test-windows:
    needs: [test-windows]
    name: Windows UE ${{ matrix.unreal }} (${{ matrix.backend }})
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        # Integration tests are supported only for UE 5.2 and newer where CRC can be disabled
        unreal: ['5.2', '5.3', '5.4', '5.5', '5.6', '5.7']
        backend: [crashpad, native]
    uses: ./.github/workflows/integration-test-windows.yml
    with:
      unreal-version: ${{ matrix.unreal }}
      backend: ${{ matrix.backend }}

  integration-test-android:
    needs: [test-android]
    name: Android UE ${{ matrix.unreal }}
    secrets: inherit
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        unreal: ['5.4', '5.5', '5.6', '5.7']
    uses: ./.github/workflows/integration-test-android.yml
    with:
      unreal-version: ${{ matrix.unreal }}
